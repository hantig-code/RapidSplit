<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (maskable safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- water lines -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M70 388 q26 -22 52 0 t52 0 t52 0 t52 0 t52 0 t52 0"/>
    <path d="M86 426 q24 -20 48 0 t48 0 t48 0 t48 0 t48 0"/>
  </g>
  <!-- kayak hull -->
  <g transform="rotate(-22 256 250)">
    <ellipse cx="256" cy="250" rx="168" ry="46" fill="#ffffff"/>
    <ellipse cx="256" cy="250" rx="150" ry="30" fill="#0b5d72"/>
    <ellipse cx="256" cy="250" rx="34" ry="24" fill="#ffffff"/>
  </g>
  <!-- paddle -->
  <g transform="rotate(-22 256 250)" stroke="#ffffff" stroke-width="16" stroke-linecap="round">
    <line x1="150" y1="150" x2="362" y2="350"/>
  </g>
  <g transform="rotate(-22 256 250)" fill="#ffffff">
    <ellipse cx="142" cy="142" rx="30" ry="17" transform="rotate(45 142 142)"/>
    <ellipse cx="370" cy="358" rx="30" ry="17" transform="rotate(45 370 358)"/>
  </g>
</svg>
